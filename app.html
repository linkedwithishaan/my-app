```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dark Purple To-Do</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#12051f,#22103b,#38195e);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    animation:fadeUp .7s ease;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-weight:700;
    letter-spacing:.5px;
}

.input-row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    border:none;
    outline:none;
    background:#2b1748;
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:15px;
    transition:.25s;
}

input:focus{
    box-shadow:0 0 0 2px #a855f7;
}

button.add{
    border:none;
    background:#8b5cf6;
    color:white;
    border-radius:12px;
    padding:0 18px;
    cursor:pointer;
    font-size:22px;
    transition:.25s;
}

button.add:hover{
    background:#9f67ff;
    transform:scale(1.05);
}

ul{
    list-style:none;
}

li{
    background:#2a1746;
    margin-bottom:12px;
    border-radius:14px;
    padding:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    animation:slideIn .35s ease;
    transition:.3s;
}

li:hover{
    transform:translateY(-2px);
}

.task{
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
}

.checkbox{
    width:22px;
    height:22px;
    border-radius:50%;
    border:2px solid #b06cff;
    cursor:pointer;
    transition:.25s;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.completed .checkbox{
    background:#a855f7;
}

.completed .checkbox::after{
    content:"✓";
    font-size:13px;
}

.text{
    word-break:break-word;
    transition:.25s;
}

.completed .text{
    text-decoration:line-through;
    opacity:.55;
}

.delete{
    border:none;
    background:#ff4d88;
    color:white;
    width:36px;
    height:36px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    transition:.25s;
}

.delete:hover{
    transform:scale(1.08);
    background:#ff2f72;
}

.empty{
    text-align:center;
    opacity:.65;
    padding:12px;
}

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateY(12px) scale(.97);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.fade-out{
    animation:fadeDelete .25s forwards;
}

@keyframes fadeDelete{
    to{
        opacity:0;
        transform:translateX(30px);
        height:0;
        margin:0;
        padding:0;
    }
}

@media (max-width:500px){

    .container{
        padding:18px;
    }

    input{
        font-size:16px;
    }

    h1{
        font-size:1.6rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>📝 My To-Do List</h1>

    <div class="input-row">
        <input id="taskInput" type="text" placeholder="Add a new task..." />
        <button class="add" id="addBtn">+</button>
    </div>

    <ul id="taskList">
        <div class="empty" id="emptyState">No tasks yet.</div>
    </ul>
</div>

<script>
const input=document.getElementById("taskInput");
const addBtn=document.getElementById("addBtn");
const list=document.getElementById("taskList");
const empty=document.getElementById("emptyState");

function updateEmpty(){
    empty.style.display=list.querySelector("li") ? "none":"block";
}

function addTask(){

    const value=input.value.trim();

    if(!value) return;

    const li=document.createElement("li");

    li.innerHTML=`
        <div class="task">
            <div class="checkbox"></div>
            <span class="text"></span>
        </div>
        <button class="delete">✕</button>
    `;

    li.querySelector(".text").textContent=value;

    li.querySelector(".checkbox").onclick=()=>{
        li.classList.toggle("completed");
    };

    li.querySelector(".delete").onclick=()=>{
        li.classList.add("fade-out");
        li.addEventListener("animationend",()=>{
            li.remove();
            updateEmpty();
        });
    };

    list.appendChild(li);

    input.value="";
    input.focus();

    updateEmpty();
}

addBtn.addEventListener("click",addTask);

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") addTask();
});

updateEmpty();
</script>

</body>
</html>
